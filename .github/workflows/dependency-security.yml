name: Dependency Security

on:
  push:
    branches: [ "main", "develop", "supply-chain-hardening", "key-rotation" ]
  pull_request:
  workflow_dispatch:

jobs:
  supply-chain-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install uv pip-audit

      - name: Verify dependency lockfile
        run: uv lock --check

      - name: Install project dependencies from lock
        run: uv sync --locked --dev

      - name: Run vulnerability audit
        run: pip-audit
