version: '3.8'

# Langfuse Self-Hosted Deployment
# Provides trace collection, visualization dashboard, and LLM cost tracking
#
# Start: docker-compose up -d
# Dashboard: http://localhost:3000 (default credentials: admin@example.com / password)
# OTLP Receiver: localhost:4317

services:
  # PostgreSQL database for Langfuse
  postgres:
    image: postgres:16-alpine
    container_name: langfuse_db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: langfuse
    ports:
      - "5433:5432"  # Avoid port conflict with main Postgres (5432)
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - langfuse_network

  # Langfuse backend API
  langfuse_server:
    image: langfuse/langfuse:latest
    container_name: langfuse_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database connection
      DATABASE_URL: postgresql://langfuse:${POSTGRES_PASSWORD:-changeme}@postgres:5432/langfuse
      
      # Server configuration
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
      NEXTAUTH_URL: http://localhost:3000
      
      # Default admin user
      DEFAULT_USER_EMAIL: ${LANGFUSE_ADMIN_EMAIL:-admin@example.com}
      DEFAULT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD:-password}
      
      # OpenTelemetry OTLP receiver configuration
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
      
      # Environment
      NODE_ENV: production
      
      # Observability
      LOG_LEVEL: info
    
    ports:
      # Web UI
      - "3000:3000"
      # OTLP gRPC receiver (for spans from applications)
      - "4317:4317"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - langfuse_network
    
    labels:
      description: "Langfuse trace collection and visualization platform"

volumes:
  langfuse_db_data:
    driver: local

networks:
  langfuse_network:
    driver: bridge
